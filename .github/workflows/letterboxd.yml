name: Fetch Media Activity

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Letterboxd RSS
        run: python .github/scripts/fetch_letterboxd.py

      - name: Fetch Goodreads RSS
        run: python .github/scripts/fetch_goodreads.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add letterboxd.json goodreads.json
          git diff --staged --quiet || (git commit -m "chore: update media activity" && git push)
