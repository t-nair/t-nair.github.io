<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Tanya Nair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100%;
      background-color: #f0ebe0;
      background-image: radial-gradient(circle, rgba(60,100,60,0.12) 1px, transparent 1px);
      background-size: 26px 26px;
      font-family: 'Inter', sans-serif;
      color: #1a2e1a;
    }

    /* ── Header ── */
    .header {
      position: fixed; top: 28px; left: 36px; z-index: 100;
    }
    .header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 20px; font-weight: bold;
      color: #1a2e1a; letter-spacing: 0.01em;
    }
    .header h1 a {
      color: inherit; text-decoration: none;
      display: flex; align-items: center; gap: 9px;
    }
    .header h1 img {
      width: 26px; height: 26px;
      display: block; flex-shrink: 0;
    }
    .header .sub {
      font-size: 11px; color: #6a8a6a;
      margin-top: 5px; letter-spacing: 0.02em;
    }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 32px; right: 36px; z-index: 100;
      display: flex; gap: 20px;
    }
    .nav a {
      font-size: 12px; color: #7a9a7a;
      text-decoration: none; letter-spacing: 0.03em;
      transition: color 180ms;
    }
    .nav a:hover { color: #1a2e1a; }
    .nav a.active { color: #1a2e1a; font-weight: 500; }

    /* ── Content ── */
    .content {
      max-width: 640px;
      margin: 0 auto;
      padding: 110px 36px 80px;
    }

    .page-title {
      font-size: 22px; font-weight: 600;
      color: #1a2e1a; letter-spacing: 0.01em;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: 13px; color: #5a7a5a; line-height: 1.6;
      margin-bottom: 48px;
    }
    .page-subtitle a {
      color: #2d5a2d;
      text-decoration: none;
    }
    .page-subtitle a:hover { text-decoration: underline; }

    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: #6a8a6a;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(60,100,60,0.15);
    }

    .post-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(60,100,60,0.08);
    }
    .post-title {
      font-size: 13px; font-weight: 600; color: #1a2e1a;
    }
    .post-title a { color: inherit; text-decoration: none; }
    .post-title a:hover { text-decoration: underline; }
    .post-desc {
      font-size: 12px; color: #5a7a5a; line-height: 1.6; margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1><a href="index.html"><img src="goat-eye-logo.png" alt="goat eye logo">Tanya Nair</a></h1>
  <div class="sub">ECE @ Johns Hopkins</div>
</div>

<div class="nav">
  <a href="portfolio.html">portfolio</a>
  <a href="blog.html" class="active">blog</a>
  <a href="mailto:tnair4@jh.edu">contact</a>
</div>

<div class="content">
  <div class="page-title">Blog</div>
  <div class="page-subtitle">
    Perspectives on emerging research, trends, and innovation in technology and beyond.
    Repurposed from my Substack, <a href="https://substack.com/@tanyanairnotes" target="_blank">@tanyanairnotes</a>.
  </div>

  <div class="section-label">Recent Posts</div>
  <div class="post-item">
    <div class="post-title">Coming soon</div>
    <div class="post-desc">More posts coming soon — check back in a bit.</div>
  </div>
</div>

</body>
</html>
