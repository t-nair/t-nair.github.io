<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Tanya Nair</title>
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="icon" type="image/png" href="images/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { height: 100%; display: flex; align-items: center; justify-content: center; }

    .box { text-align: center; }

    .code {
      font-family: var(--font-mono);
      font-size: 64px; font-weight: 500; color: var(--color-ink);
      letter-spacing: -0.02em; line-height: 1;
    }

    .msg {
      font-size: var(--text-subtitle); color: var(--color-body);
      margin-top: 14px; letter-spacing: 0;
    }

    .home {
      display: inline-flex; align-items: center; justify-content: center;
      margin-top: 24px; min-height: 44px;
      font-family: var(--font-mono);
      font-size: var(--text-base); color: var(--color-accent);
      text-decoration: none; letter-spacing: var(--track-mono);
    }
    .home:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      .code { font-size: 48px; }
      .box { padding: 0 var(--space-4); }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <div class="msg">Nothing here.</div>
    <a class="home" href="index.html">← back home</a>
  </div>
</body>
</html>
