<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Tanya Nair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: #f0ebe0;
      background-image: radial-gradient(circle, rgba(60,100,60,0.12) 1px, transparent 1px);
      background-size: 26px 26px;
      font-family: 'Inter', sans-serif;
      color: #1a2e1a;
      display: flex; align-items: center; justify-content: center;
    }

    .box { text-align: center; }

    .code {
      font-size: 72px; font-weight: 600; color: #1a2e1a;
      letter-spacing: -0.03em; line-height: 1;
    }

    .msg {
      font-size: 13px; color: #5a7a5a;
      margin-top: 12px; letter-spacing: 0.01em;
    }

    .home {
      display: inline-block; margin-top: 24px;
      font-size: 12px; color: #2d5a2d;
      text-decoration: none; letter-spacing: 0.03em;
    }
    .home:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <div class="msg">Nothing here.</div>
    <a class="home" href="index.html">← back home</a>
  </div>
</body>
</html>
