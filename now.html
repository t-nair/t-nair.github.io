<head>
  <meta charset="UTF-8">

  <meta property="og:title" content="Now | Tanya Nair">

  <meta property="og:image" content="https://t-nair.github.io/images/og-image.png">
  <meta property="og:image:width" content="1200">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Now | Tanya Nair">
  <meta name="twitter:description" content="What Tanya is reading and watching right now.">
  <meta name="twitter:image" content="https://t-nair.github.io/images/og-image.png">
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="icon" type="image/png" href="images/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { min-height: 100%; }

    .empty-note { font-size: var(--text-md); color: var(--color-body); }

    .data-source-note { font-size: var(--text-sm); color: var(--color-meta); line-height: 1.6; margin-bottom: 36px; }
    .data-source-note a { color: inherit; text-decoration: underline; }

    /* ── Currently reading ── */
    .current-book {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-divider);
    }
    .current-book-cover {
      width: 56px; flex-shrink: 0;
      border-radius: var(--radius-sm); display: block;
      aspect-ratio: 2/3; object-fit: cover;
      background: var(--color-divider);
    }
    .current-book-cover-placeholder {
      width: 56px; flex-shrink: 0;
      aspect-ratio: 2/3; border-radius: var(--radius-sm);
      background: var(--color-divider);
    }
    .current-book-title {
      font-size: var(--text-subtitle); font-weight: 600; color: var(--color-ink);
      letter-spacing: -0.01em; line-height: 1.35;
    }
    .current-book-title a { color: inherit; text-decoration: none; }
    .current-book-title a:hover { text-decoration: underline; }
    .current-book-author { font-size: var(--text-base); color: var(--color-body); margin-top: 5px; }

    /* ── Media grid (books + films) ── */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 16px;
      margin-top: 4px;
    }
    .media-card a { text-decoration: none; color: inherit; }
    .media-cover {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      border-radius: var(--radius-md); display: block;
      background: var(--color-divider);
    }
    .media-cover-placeholder {
      width: 100%; aspect-ratio: 2/3;
      border-radius: var(--radius-md); background: var(--color-divider);
    }
    .media-title {
      font-size: var(--text-base); font-weight: 600; color: var(--color-ink);
      line-height: 1.35; margin-top: 8px;
    }
    /* dates / years — mono (signature) */
    .media-meta {
      font-family: var(--font-mono);
      font-size: var(--text-sm); color: var(--color-meta);
      letter-spacing: var(--track-mono); margin-top: 3px;
    }
    .media-stars { font-size: var(--text-sm); color: var(--color-accent); margin-top: 2px; }
    .media-liked { font-size: var(--text-sm); color: #c0392b; margin-top: 2px; }

    @media (max-width: 700px) {
      .media-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .current-book { gap: 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1><a href="index.html"><picture>
      <source type="image/webp" srcset="images/logo-64.webp 1x, images/logo-128.webp 2x">
      <img src="images/logo-64.png" srcset="images/logo-64.png 1x, images/logo-128.png 2x" alt="" width="26" height="26">
    </picture>Tanya Nair</a></h1>
  <div class="sub">ECE @ Johns Hopkins</div>
</div>

<nav class="nav">
  <a href="blog.html">blog</a>
  <a href="now.html" class="active">now</a>
  <a href="projects.html">projects</a>
  <a href="mailto:tnair4@jh.edu">contact</a>
</nav>

<div class="content">
  <h2 class="page-title">Now</h2>
  <div class="page-subtitle">What I'm reading and watching.</div>
  <div class="data-source-note">Data pulled from <a href="https://www.goodreads.com" target="_blank" rel="noopener">Goodreads</a> and <a href="https://letterboxd.com" target="_blank" rel="noopener">Letterboxd</a> RSS feeds via a Python scraper, auto-updated every 6 hours by GitHub Actions.</div>

  <section>
  <div class="section-label">Reading</div>
  <div id="currently-reading"></div>
  </section>

  <section>
  <div class="section-label" style="margin-top: 36px">Recently Finished</div>
  <div id="recently-read" class="media-grid"></div>
  </section>

  <section>
  <div class="section-label" style="margin-top: 48px">Watching</div>
  <div id="films-grid" class="media-grid"></div>
  </section>
</div>

<script>
  function coverImg(src, alt, cls) {
    return src
      ? `<img class="${cls}" src="${src}" alt="${alt}" loading="lazy">`
      : `<div class="${cls}-placeholder"></div>`;
  }

  function mediaCard(link, cover, title, meta, stars, liked) {
    return `
      <div class="media-card">
        <a href="${link}" target="_blank" rel="noopener">
          ${coverImg(cover, title, 'media-cover')}
        </a>
        <div class="media-title"><a href="${link}" target="_blank" rel="noopener">${title}</a></div>
        <div class="media-meta">${meta || ''}</div>
        ${stars ? `<div class="media-stars">${stars}${liked ? ' <span class="media-liked">♥</span>' : ''}</div>` : liked ? `<div class="media-liked">♥</div>` : ''}
      </div>`;
  }

  // Goodreads
  fetch('goodreads.json')
    .then(r => r.json())
    .then(({ currently_reading, recently_read }) => {
      const currentEl = document.getElementById('currently-reading');
      if (currently_reading.length) {
        currentEl.innerHTML = currently_reading.map(b => `
          <div class="current-book">
            <a href="${b.link}" target="_blank" rel="noopener">
              ${coverImg(b.cover, b.title, 'current-book-cover')}
            </a>
            <div>
              <div class="current-book-title"><a href="${b.link}" target="_blank" rel="noopener">${b.title}</a></div>
              <div class="current-book-author">${b.author || ''}</div>
            </div>
          </div>`).join('');
      } else {
        currentEl.innerHTML = '<p class="empty-note">Nothing in progress right now.</p>';
      }

      const readEl = document.getElementById('recently-read');
      if (recently_read.length) {
        readEl.innerHTML = recently_read.map(b =>
          mediaCard(b.link, b.cover, b.title, b.author, b.rating ? '★'.repeat(b.rating) : null)
        ).join('');
      } else {
        readEl.innerHTML = '<p class="empty-note">Nothing logged yet.</p>';
      }
    })
    .catch(() => {});

  // Letterboxd
  fetch('letterboxd.json')
    .then(r => r.json())
    .then(films => {
      const el = document.getElementById('films-grid');
      if (films.length) {
        el.innerHTML = films.map(f =>
          mediaCard(f.link, f.poster, f.title, f.year, f.stars, f.liked)
        ).join('');
      } else {
        el.innerHTML = '<p class="empty-note">Nothing logged yet.</p>';
      }
    })
    .catch(() => {});
</script>

</body>
</html>
